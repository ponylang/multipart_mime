name: pony-lint

on:
  pull_request:
    paths:
      - '**/*.pony'

concurrency:
  group: pony-lint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  packages: read

jobs:
  pony-lint:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ponylang/shared-docker-ci-standard-builder:release
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Lint
        run: make lint
